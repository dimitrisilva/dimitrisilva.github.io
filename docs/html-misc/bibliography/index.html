<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="bibliography">
  <meta name="robots" content="noindex, nofollow">
  <title>Bibliography</title>
  <style>
    :root {
      /* Color pallette */
      --color-bg-body: rgb(191, 191, 191);
      --color-bg-input: rgb(223, 223, 223);
      --color-border: rgb(127, 127, 127);
      --color-text-primary: rgb(0, 0, 0);
      
      /* Fonts */
      --font-serif: 'Latin Modern Roman', serif;
      --font-size-large: 2.00em;
      --font-weight-normal: 400;
      --font-weight-semibold: 600;
      
      /* Spacing */
      --spacing-large: 60px;
      
      /* Layout */
      --padding-horizontal: 20%;
      --padding-vertical: 10px;
    }
    
    @font-face {
      font-family: 'Latin Modern Roman';
      src: format('woff2'), format('woff');
      font-weight: var(--font-weight-normal);
      font-style: normal;
      font-display: swap;
    }
    
    body {
      background-color: var(--color-bg-body);
      padding: var(--padding-vertical) var(--padding-horizontal);
      font-family: var(--font-serif);
      color: var(--color-text-primary);
      line-height: 1.6;
    }
    
    h1 {
      font-size: var(--font-size-large);
      margin-bottom: var(--spacing-large);
      text-align: center;
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }
    
    h2 {
      font-size: 1.5em;
      margin-bottom: 20px;
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-primary);
    }
    
    a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>

    </header>

</body>
</html>
